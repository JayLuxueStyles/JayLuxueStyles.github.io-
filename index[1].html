<!DOCTYPE html>
<html>
<head>
  <title>JayLuxe Hair</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {margin:0;font-family:'Segoe UI',sans-serif;background:#fafafa;color:#222;text-align:center;}
    header {padding:15px;background:white;border-bottom:1px solid #eee;}
    header h1 {color:#6a0dad;letter-spacing:3px;}

    .hero {
      height:70vh;
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('frontal.jpg');
      background-size:cover;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
    }

    .section {padding:50px 20px;}

    .services {
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .service {
      width:220px;
      border-radius:12px;
      overflow:hidden;
      cursor:pointer;
      border:2px solid transparent;
    }

    .service img {
      width:100%;
      display:block;
    }

    .service p {
      background:white;
      margin:0;
      padding:10px;
      font-weight:bold;
    }

    .selected {
      border:2px solid gold;
    }

    .btn {
      background:black;
      color:gold;
      padding:12px 24px;
      border-radius:30px;
      text-decoration:none;
      display:inline-block;
      margin-top:12px;
      border:1px solid gold;
    }

    footer {background:#111;color:#aaa;padding:20px;font-size:13px;}
  </style>

  <script>
    function selectService(el, name) {
      document.querySelectorAll('.service').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      document.getElementById('selectedService').innerText = "Selected: " + name;
    }
  </script>

</head>
<body>

<header><h1>JAYLUXE</h1></header>

<section class="hero">
  <h2>Select Your Style 💜</h2>
</section>

<section class="section">
  <h2>Choose Your Service</h2>

  <div class="services">

    <div class="service" onclick="selectService(this,'Frontal Install')">
      <img src="frontal.jpg">
      <p>Frontal Install</p>
    </div>

    <div class="service" onclick="selectService(this,'Closure Install')">
      <img src="closure.jpg">
      <p>Closure Install</p>
    </div>

    <div class="service" onclick="selectService(this,'Quick Weave')">
      <img src="quickweave.jpg">
      <p>Quick Weave</p>
    </div>

  </div>

  <p id="selectedService" style="margin-top:20px;font-weight:bold;"></p>

</section>

<section class="section">
  <h2>Book Appointment 💅</h2>
  <p>Please include your selected service when booking</p>

  <a class="btn" href="https://instagram.com/jay_luxue_styles" target="_blank">DM on Instagram</a><br><br>
  <a class="btn" href="tel:18133372815">Call / Text Me</a>
</section>

<footer>© 2026 JayLuxe Hair</footer>

</body>
</html>
